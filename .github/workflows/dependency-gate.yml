name: Dependency Security Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'server/package.json'
      - 'server/package-lock.json'

jobs:
  snyk-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=server/package.json --severity-threshold=high

  auto-merge-renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: snyk-security-scan
    # Only auto merge patch/minor from Renovate — major needs manual review
    if: |
      github.actor == 'renovate[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'major-update')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auto merge Renovate PR
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash