name: Dependency Security Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'server/package.json'
      - 'server/package-lock.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  snyk-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=server/package.json --severity-threshold=high

  auto-merge-renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: snyk-security-scan
    if: |
      (github.actor == 'renovate[bot]' || github.actor == 'renovate') &&
      !contains(github.event.pull_request.labels.*.name, 'major-update')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable GitHub native auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
